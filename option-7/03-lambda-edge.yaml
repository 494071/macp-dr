AWSTemplateFormatVersion: '2010-09-09'
Description: 'Option 7 - Lambda@Edge function for origin routing based on DynamoDB control signal'

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name

  DynamoDBTableName:
    Type: String
    Default: macp-dr-prod-failover-state
    Description: Name of the DynamoDB Global Table

  PrimaryBucketDomain:
    Type: String
    Description: Regional domain name of primary S3 bucket (us-east-1)
    Default: macp-dr-opt7-content-prod-us-east-1.s3.us-east-1.amazonaws.com

  DRBucketDomain:
    Type: String
    Description: Regional domain name of DR S3 bucket (us-west-2)
    Default: macp-dr-opt7-content-prod-us-west-2.s3.us-west-2.amazonaws.com

Resources:
  # IAM Role for Lambda@Edge
  OriginRouterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'macp-dr-${Environment}-origin-router-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Lambda service
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
          # Lambda@Edge service (edgelambda)
          - Effect: Allow
            Principal:
              Service: edgelambda.amazonaws.com
            Action: sts:AssumeRole
      
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      
      Policies:
        - PolicyName: DynamoDBReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read from DynamoDB in both regions
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !Sub 'arn:aws:dynamodb:us-east-1:${AWS::AccountId}:table/${DynamoDBTableName}'
                  - !Sub 'arn:aws:dynamodb:us-west-2:${AWS::AccountId}:table/${DynamoDBTableName}'

  # Lambda@Edge Function
  OriginRouterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'macp-dr-${Environment}-origin-router'
      Description: Routes CloudFront requests to active region based on DynamoDB control signal
      Runtime: python3.12
      Handler: index.handler
      Timeout: 5  # Lambda@Edge origin-request max is 30s, but we want fast
      MemorySize: 128
      Role: !GetAtt OriginRouterRole.Arn
      Code:
        ZipFile: !Sub |
          import boto3
          import time
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Configuration - hardcoded since Lambda@Edge doesn't support env vars
          TABLE_NAME = '${DynamoDBTableName}'
          CACHE_TTL = 15  # seconds

          ORIGINS = {
              'us-east-1': {
                  'domainName': '${PrimaryBucketDomain}',
                  'region': 'us-east-1'
              },
              'us-west-2': {
                  'domainName': '${DRBucketDomain}',
                  'region': 'us-west-2'
              }
          }

          # Module-level cache (persists across warm invocations)
          CACHE = {'region': None, 'expires': 0, 'last_known': None}


          def get_active_region():
              """Read active region from DynamoDB with caching and multi-region fallback."""
              global CACHE
              now = time.time()
              
              # Return cached value if fresh
              if now < CACHE['expires'] and CACHE['region']:
                  logger.info(f"Cache hit: {CACHE['region']}")
                  return CACHE['region']
              
              # Try each DDB replica in order
              for ddb_region in ['us-east-1', 'us-west-2']:
                  try:
                      client = boto3.client('dynamodb', region_name=ddb_region)
                      resp = client.get_item(
                          TableName=TABLE_NAME,
                          Key={'config_key': {'S': 'active_region'}},
                          ConsistentRead=False
                      )
                      
                      if 'Item' in resp:
                          region = resp['Item']['active_region']['S']
                          CACHE = {
                              'region': region,
                              'expires': now + CACHE_TTL,
                              'last_known': region
                          }
                          logger.info(f"DDB read from {ddb_region}: {region}")
                          return region
                  except Exception as e:
                      logger.warning(f"DDB read failed for {ddb_region}: {e}")
                      continue
              
              # Fallback: last-known-good or default to DR
              fallback = CACHE.get('last_known') or 'us-west-2'
              logger.warning(f"All DDB reads failed, using fallback: {fallback}")
              return fallback


          def handler(event, context):
              """Lambda@Edge origin-request handler."""
              request = event['Records'][0]['cf']['request']
              
              # Get active region from DynamoDB (with caching)
              active_region = get_active_region()
              origin_config = ORIGINS.get(active_region, ORIGINS['us-west-2'])
              
              # Rewrite origin to active region's S3 bucket
              request['origin'] = {
                  's3': {
                      'domainName': origin_config['domainName'],
                      'region': origin_config['region'],
                      'authMethod': 'origin-access-identity',
                      'path': '',
                      'customHeaders': {}
                  }
              }
              
              # Update Host header to match origin
              request['headers']['host'] = [{
                  'key': 'host',
                  'value': origin_config['domainName']
              }]
              
              logger.info(f"Routing to {active_region}: {origin_config['domainName']}")
              return request

  # Published version for Lambda@Edge (required - cannot use $LATEST)
  OriginRouterVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref OriginRouterFunction
      Description: !Sub 'Version for Lambda@Edge deployment - ${Environment}'

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt OriginRouterFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FunctionArn'

  FunctionVersionArn:
    Description: Lambda function version ARN (use this for CloudFront)
    Value: !Ref OriginRouterVersion
    Export:
      Name: !Sub '${AWS::StackName}-FunctionVersionArn'

  RoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt OriginRouterRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'
