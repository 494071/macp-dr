<!DOCTYPE html>
<html>
<head>
  <title>MACP DR Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .controls {
      text-align: center;
      margin-bottom: 20px;
    }
    button {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin: 0 10px;
    }
    button:hover {
      background: #357abd;
    }
    .status {
      display: inline-block;
      margin-left: 20px;
      font-size: 14px;
      color: #888;
    }
    .section-title {
      text-align: center;
      margin: 30px 0 15px 0;
      color: #888;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .panel {
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .panel-header {
      background: #0f3460;
      padding: 10px 15px;
      font-weight: bold;
      font-size: 14px;
    }
    .panel-header.api {
      background: #2d4a22;
    }
    iframe {
      width: 350px;
      height: 200px;
      border: none;
      background: white;
    }
    .api-response {
      width: 350px;
      height: 200px;
      padding: 15px;
      box-sizing: border-box;
      background: #0d1117;
      color: #7ee787;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .api-response.error {
      color: #f85149;
    }
    .region-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 10px;
    }
    .region-east {
      background: #1f6feb;
    }
    .region-west {
      background: #a371f7;
    }
  </style>
</head>
<body>
  <h1>🔄 MACP DR Dashboard</h1>
  <div class="controls">
    <button onclick="refreshAll()">🔄 Refresh All</button>
    <button onclick="autoRefresh()">⏱️ Auto-Refresh (5s)</button>
    <button onclick="stopAutoRefresh()">⏹️ Stop</button>
    <span class="status" id="status"></span>
  </div>

  <div class="section-title">Static Content (S3)</div>
  <div class="container">
    <div class="panel">
      <div class="panel-header">👤 Admin</div>
      <iframe id="admin" src="https://admin.prod.gsa.dos.macp.cloud/"></iframe>
    </div>
    <div class="panel">
      <div class="panel-header">🎧 Agent</div>
      <iframe id="agent" src="https://agent.prod.gsa.dos.macp.cloud/"></iframe>
    </div>
    <div class="panel">
      <div class="panel-header">💬 Chat</div>
      <iframe id="chat" src="https://chat.prod.gsa.dos.macp.cloud/"></iframe>
    </div>
  </div>

  <div class="section-title">API Gateway</div>
  <div class="container">
    <div class="panel">
      <div class="panel-header api">🔌 Chat API <span id="api-region-badge" class="region-badge"></span></div>
      <div id="chat-api" class="api-response">Loading...</div>
    </div>
  </div>

  <script>
    let intervalId = null;

    async function fetchChatApi() {
      const container = document.getElementById('chat-api');
      const badge = document.getElementById('api-region-badge');
      try {
        const response = await fetch(`https://chat-api.prod.gsa.dos.macp.cloud/?t=${Date.now()}`);
        const data = await response.json();
        container.textContent = JSON.stringify(data, null, 2);
        container.className = 'api-response';
        
        // Update region badge
        if (data.region === 'us-east-1') {
          badge.textContent = 'us-east-1';
          badge.className = 'region-badge region-east';
        } else if (data.region === 'us-west-2') {
          badge.textContent = 'us-west-2';
          badge.className = 'region-badge region-west';
        }
      } catch (error) {
        container.textContent = `Error: ${error.message}`;
        container.className = 'api-response error';
        badge.textContent = '';
        badge.className = 'region-badge';
      }
    }

    function refreshAll() {
      const timestamp = Date.now();
      document.getElementById('admin').src = `https://admin.prod.gsa.dos.macp.cloud/?t=${timestamp}`;
      document.getElementById('agent').src = `https://agent.prod.gsa.dos.macp.cloud/?t=${timestamp}`;
      document.getElementById('chat').src = `https://chat.prod.gsa.dos.macp.cloud/?t=${timestamp}`;
      fetchChatApi();
      document.getElementById('status').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
    }

    function autoRefresh() {
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(refreshAll, 5000);
      document.getElementById('status').textContent = 'Auto-refresh ON (every 5s)';
      refreshAll();
    }

    function stopAutoRefresh() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      document.getElementById('status').textContent = 'Auto-refresh OFF';
    }

    // Initial load
    fetchChatApi();
  </script>
</body>
</html>
